<!DOCTYPE html>
<html>
  <head>
    <title>MindAR WebAR Video</title>
    <script src="https://cdn.jsdelivr.net/npm/aframe@1.2.0/dist/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>
    <style> body { margin: 0; overflow: hidden; } </style>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: ./mindar/targets.mind;" 
             embedded 
             color-space="sRGB" 
             renderer="precision: mediump;" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: true">

      <a-assets>
        <video id="video1" src="./assets/video.mp4" autoplay loop muted playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video 
          src="#video1" 
          width="1.5" 
          height="0.85" 
          position="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>
  </body>
</html>
