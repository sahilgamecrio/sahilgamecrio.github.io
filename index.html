<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sahil AR Video</title>

  <!-- A-Frame + MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.2.0/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <a-scene 
    mindar-image="imageTargetSrc: ./mindar/targets.mind;" 
    color-space="sRGB" 
    embedded 
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true">

    <!-- Assets -->
    <a-assets>
      <video id="video1" src="./assets/video.mp4" autoplay loop muted playsinline crossorigin="anonymous"></video>
    </a-assets>

    <!-- Camera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- AR Marker Target -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-video 
        src="#video1" 
        width="1.5" 
        height="0.85" 
        position="0 0 0"
        rotation="0 0 0">
      </a-video>
    </a-entity>

  </a-scene>
</body>
</html>
